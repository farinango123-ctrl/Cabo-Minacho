<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Archivo General GA7</title>
    <link rel="stylesheet" href="css/Login.css">
</head>

<body>
    <div class="navbar-login">
        <h2>ARCHIVO GENERAL - GA7 “CABO MINACHO”</h2>
    </div>
    
    <div class="login-container">
        <img src="img/logo.jpeg" alt="Logo GA7">
        <h2>Iniciar Sesión</h2>

        <div id="msgError" style="color: red; background: #fee; border: 1px solid #fcc; padding: 10px; margin-bottom: 15px; display: none; border-radius: 4px; font-weight: bold;"></div>

        <form id="formLogin" autocomplete="off">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" required>
            
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit" id="btnLogin">Ingresar</button>
        </form>
    </div>

    <script>
        const form = document.getElementById("formLogin");
        const btn = document.getElementById("btnLogin");
        const msg = document.getElementById("msgError");
        const inputUser = document.getElementById("usuario");
        const inputPass = document.getElementById("password");

        form.addEventListener("submit", async (e) => {
            e.preventDefault(); 
            
            msg.style.display = "none";
            btn.disabled = true;
            btn.textContent = "Ingresando...";

            const data = {
                usuario: inputUser.value.trim(),
                password: inputPass.value
            };

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.success) {
                    // Si el servidor responde con éxito, redirigimos
                    window.location.href = result.redirect;
                } else {
                    // ❌ Si falla: Mostrar error y borrar campos
                    msg.style.display = "block";
                    msg.textContent = result.message || "Usuario o contraseña incorrectos";
                    
                    form.reset();      // ✅ Esto limpia usuario y clave automáticamente
                    inputUser.focus(); // Pone el cursor en el primer campo
                }
            } catch (err) {
                msg.style.display = "block";
                msg.textContent = "Error de comunicación con el servidor";
            } finally {
                btn.disabled = false;
                btn.textContent = "Ingresar";
            }
        });
    </script>
</body>
</html>
